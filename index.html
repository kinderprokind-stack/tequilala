<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tequi-La-La</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --negro: #0a0a0a; --negro2: #111111; --negro3: #1a1a1a;
      --rojo: #c0392b; --rojo2: #e74c3c;
      --dorado: #c9a34e; --dorado2: #e8c47a;
      --blanco: #f5efe6; --gris: #888880;
      --verde: #27ae60; --verde2: #2ecc71;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--negro); color:var(--blanco); font-family:'Inter',sans-serif; overflow-x:hidden; }

    /* ── MODO DUAL ── */
    .solo-postulacion { display:none !important; }
    body.modo-postulacion .solo-postulacion { display:block !important; }
    body.modo-postulacion .solo-publico { display:none !important; }
    #modo-toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
      background:var(--negro3); border:1px solid var(--dorado);
      color:var(--dorado); font-size:13px; font-weight:600; letter-spacing:2px;
      padding:12px 28px; border-radius:40px; z-index:9999;
      transition:transform 0.4s ease,opacity 0.4s ease; opacity:0;
    }
    #modo-toast.visible { transform:translateX(-50%) translateY(0); opacity:1; }

    /* ── PANEL ADMIN ── */
    #panel-admin {
      display:none; position:fixed; inset:0; z-index:5000;
      background:var(--negro); overflow-y:auto;
    }
    #panel-admin.visible { display:block; }
    .admin-nav {
      background:var(--negro2); border-bottom:1px solid rgba(201,163,78,0.2);
      padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:10;
    }
    .admin-nav-logo { font-family:'Bebas Neue'; font-size:22px; color:var(--dorado); letter-spacing:2px; }
    .admin-nav-right { display:flex; align-items:center; gap:16px; }
    .admin-badge-pendientes {
      background:var(--rojo); color:white; font-size:12px; font-weight:700;
      padding:4px 12px; border-radius:20px; letter-spacing:1px;
    }
    .btn-admin-salir {
      background:transparent; border:1px solid rgba(255,255,255,0.15); color:var(--gris);
      padding:8px 18px; border-radius:4px; font-size:12px; font-weight:600;
      letter-spacing:1px; cursor:pointer; transition:all 0.2s;
    }
    .btn-admin-salir:hover { border-color:var(--rojo); color:var(--rojo); }
    .admin-body { max-width:1100px; margin:0 auto; padding:48px 32px; }
    .admin-header { margin-bottom:40px; }
    .admin-title { font-family:'Bebas Neue'; font-size:52px; color:var(--blanco); letter-spacing:2px; }
    .admin-title span { color:var(--dorado); }
    .admin-subtitle { font-size:14px; color:var(--gris); margin-top:6px; }
    .admin-filters { display:flex; gap:10px; margin-bottom:32px; flex-wrap:wrap; }
    .admin-filter-btn {
      background:var(--negro3); border:1px solid rgba(255,255,255,0.08); color:var(--gris);
      padding:8px 20px; border-radius:20px; font-size:12px; font-weight:600;
      letter-spacing:1px; cursor:pointer; transition:all 0.2s;
    }
    .admin-filter-btn.active { background:rgba(201,163,78,0.15); border-color:var(--dorado); color:var(--dorado); }
    .admin-empty {
      text-align:center; padding:80px 20px; color:var(--gris);
      border:1px dashed rgba(255,255,255,0.08); border-radius:4px;
    }
    .admin-empty-icon { font-size:52px; margin-bottom:16px; }
    .admin-empty h3 { font-family:'Bebas Neue'; font-size:28px; color:rgba(255,255,255,0.2); margin-bottom:8px; }
    .reservas-lista { display:flex; flex-direction:column; gap:16px; }
    .reserva-item {
      background:var(--negro2); border:1px solid rgba(255,255,255,0.06);
      border-radius:4px; padding:28px 32px; position:relative;
      transition:border-color 0.2s; display:flex; gap:24px; align-items:flex-start;
    }
    .reserva-item.pendiente { border-left:4px solid var(--rojo); }
    .reserva-item.gestionado { border-left:4px solid var(--verde); opacity:0.7; }
    .reserva-item:hover { border-color:rgba(201,163,78,0.2); }
    .reserva-item-estado {
      flex-shrink:0; width:100px; display:flex; flex-direction:column; align-items:center; gap:8px; padding-top:4px;
    }
    .estado-dot {
      width:12px; height:12px; border-radius:50%; flex-shrink:0;
    }
    .estado-dot.pendiente { background:var(--rojo); box-shadow:0 0 8px rgba(192,57,43,0.6); }
    .estado-dot.gestionado { background:var(--verde); box-shadow:0 0 8px rgba(39,174,96,0.6); }
    .estado-label { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
    .estado-label.pendiente { color:var(--rojo2); }
    .estado-label.gestionado { color:var(--verde2); }
    .reserva-item-body { flex:1; }
    .reserva-item-header { display:flex; align-items:center; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
    .reserva-nombre { font-family:'Bebas Neue'; font-size:26px; color:var(--blanco); letter-spacing:1px; }
    .reserva-espacio-badge {
      background:rgba(201,163,78,0.1); border:1px solid rgba(201,163,78,0.25);
      color:var(--dorado); font-size:11px; font-weight:600; letter-spacing:1px;
      padding:4px 12px; border-radius:20px;
    }
    .reserva-fecha { font-size:12px; color:var(--gris); margin-left:auto; }
    .reserva-campos { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .reserva-campo { background:var(--negro3); padding:12px 16px; border-radius:3px; }
    .reserva-campo-label { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--dorado); margin-bottom:4px; }
    .reserva-campo-val { font-size:14px; color:var(--blanco); line-height:1.5; }
    .reserva-campo.full { grid-column:1/-1; }
    .reserva-actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-gestionar {
      background:rgba(39,174,96,0.1); border:1px solid rgba(39,174,96,0.3); color:var(--verde2);
      padding:8px 18px; border-radius:4px; font-size:11px; font-weight:700;
      letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .btn-gestionar:hover { background:rgba(39,174,96,0.2); }
    .btn-pendiente {
      background:rgba(192,57,43,0.1); border:1px solid rgba(192,57,43,0.3); color:var(--rojo2);
      padding:8px 18px; border-radius:4px; font-size:11px; font-weight:700;
      letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .btn-pendiente:hover { background:rgba(192,57,43,0.2); }
    .btn-eliminar {
      background:transparent; border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.25);
      padding:8px 18px; border-radius:4px; font-size:11px; font-weight:700;
      letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .btn-eliminar:hover { border-color:var(--rojo); color:var(--rojo); }
    .admin-loading { text-align:center; padding:60px; color:var(--gris); font-size:14px; letter-spacing:2px; }

    /* ── LOGIN ADMIN ── */
    #login-admin {
      display:none; position:fixed; inset:0; z-index:4000;
      background:rgba(0,0,0,0.92); backdrop-filter:blur(10px);
      align-items:center; justify-content:center;
    }
    #login-admin.visible { display:flex; }
    .login-box {
      background:var(--negro2); border:1px solid rgba(201,163,78,0.3);
      border-radius:4px; padding:52px 48px; width:100%; max-width:400px;
      position:relative;
    }
    .login-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(to right, var(--rojo), var(--dorado));
    }
    .login-icon { font-size:44px; margin-bottom:16px; }
    .login-title { font-family:'Bebas Neue'; font-size:38px; color:var(--dorado); letter-spacing:2px; margin-bottom:6px; }
    .login-sub { font-size:13px; color:var(--gris); margin-bottom:32px; }
    .login-input {
      width:100%; background:var(--negro3); border:1px solid rgba(255,255,255,0.1);
      border-radius:3px; padding:14px 18px; color:var(--blanco);
      font-family:'Inter'; font-size:15px; outline:none;
      transition:border-color 0.2s; margin-bottom:16px; letter-spacing:2px;
    }
    .login-input:focus { border-color:var(--dorado); }
    .login-input.error { border-color:var(--rojo2); }
    .login-error { font-size:12px; color:var(--rojo2); margin-bottom:16px; display:none; }
    .btn-login {
      width:100%; background:var(--rojo); color:white; border:none;
      padding:15px; border-radius:4px; font-size:13px; font-weight:700;
      letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:background 0.2s;
    }
    .btn-login:hover { background:var(--rojo2); }

    /* ── MODAL DE RESERVA ── */
    #modal-reserva {
      position:fixed; inset:0; z-index:2000;
      background:rgba(0,0,0,0.85); backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
      padding:20px; opacity:0; pointer-events:none;
      transition:opacity 0.3s ease;
    }
    #modal-reserva.visible { opacity:1; pointer-events:all; }
    .modal-box {
      background:var(--negro2); border:1px solid rgba(201,163,78,0.3);
      border-radius:4px; padding:48px 44px; width:100%; max-width:520px;
      position:relative; transform:translateY(20px);
      transition:transform 0.35s ease;
    }
    #modal-reserva.visible .modal-box { transform:translateY(0); }
    .modal-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(to right, var(--rojo), var(--dorado));
    }
    .modal-close {
      position:absolute; top:18px; right:20px;
      background:none; border:none; color:var(--gris);
      font-size:22px; cursor:pointer; line-height:1; transition:color 0.2s;
    }
    .modal-close:hover { color:var(--blanco); }
    .modal-logo { font-size:32px; margin-bottom:6px; }
    .modal-title { font-family:'Bebas Neue'; font-size:36px; color:var(--dorado); letter-spacing:2px; margin-bottom:4px; }
    .modal-subtitle { font-size:13px; color:var(--gris); margin-bottom:32px; line-height:1.5; }
    .modal-form { display:flex; flex-direction:column; gap:18px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--dorado); }
    .form-input,.form-select,.form-textarea {
      background
